services:
  kbju-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_PILOT_USER_IDS: ${TELEGRAM_PILOT_USER_IDS}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OMNIROUTE_BASE_URL: ${OMNIROUTE_BASE_URL}
      OMNIROUTE_API_KEY: ${OMNIROUTE_API_KEY}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY}
      USDA_FDC_API_KEY: ${USDA_FDC_API_KEY}
      PERSONA_PATH: ${PERSONA_PATH}
      PO_ALERT_CHAT_ID: ${PO_ALERT_CHAT_ID}
      MONTHLY_SPEND_CEILING_USD: ${MONTHLY_SPEND_CEILING_USD:-10}
      AUDIT_DB_URL: ${AUDIT_DB_URL}
      SERVER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://localhost:3000/kbju/health',r=>{process.exit(r.statusCode===200?0:1)});req.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - openclaw_state:/app/state
      - kbju_config:/app/config
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  openclaw-gateway:
    image: ghcr.io/nicholasgriffintn/openclaw:latest
    environment:
      KBJU_SIDECAR_URL: "http://kbju-sidecar:3000"
      PLUGIN_kbju_bridge_ENABLED: "true"
    depends_on:
      kbju-sidecar:
        condition: service_healthy
    volumes:
      - openclaw_state:/home/openclaw/.openclaw
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kbju
    volumes:
      - kbju_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  metrics:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    entrypoint: ["node", "-e", "require('./dist/src/deployment/healthCheck.js').startMetricsServer()"]
    environment:
      METRICS_HOST: "metrics"
      METRICS_PORT: "9464"
    ports:
      - "127.0.0.1:9464:9464"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://metrics:9464/healthz',r=>{process.exit(r.statusCode===200?0:1)});req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  kbju_pgdata:
  openclaw_state:
  kbju_config:

networks:
  internal:
